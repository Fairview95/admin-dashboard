name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '{head: .head.sha, base: .base.sha, number: .number}')
          else
            PR_DATA=$(echo '{"head":"${{ github.event.pull_request.head.sha }}","base":"${{ github.event.pull_request.base.sha }}","number":${{ github.event.pull_request.number }}}')
          fi
          echo "head=$(echo "$PR_DATA" | jq -r '.head')" >> "$GITHUB_OUTPUT"
          echo "base=$(echo "$PR_DATA" | jq -r '.base')" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_DATA" | jq -r '.number')" >> "$GITHUB_OUTPUT"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex review
        id: codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BASE="${{ steps.pr-context.outputs.base }}"

          # Capture review output (built-in review prompt, scoped to base)
          codex review \
            --base "$BASE" \
            -c 'model_reasoning_effort="high"' \
            --enable web_search_cached 2> /tmp/codex-stderr.txt | tee /tmp/codex-output.txt || true

          # Save output for next step
          {
            echo 'REVIEW_OUTPUT<<EOF'
            cat /tmp/codex-output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.codex.outputs.REVIEW_OUTPUT }}`;
            const truncated = output.length > 65000
              ? output.slice(0, 65000) + '\n\n_(Review truncated due to length)_'
              : output;

            const body = `## Codex Review\n\n${truncated || '_No review output generated._'}`;

            await github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
