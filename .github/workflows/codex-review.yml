name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
            PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUM" --jq '{head: .head.sha, base: .base.sha, number: .number}')
          else
            PR_DATA=$(echo '{"head":"${{ github.event.pull_request.head.sha }}","base":"${{ github.event.pull_request.base.sha }}","number":${{ github.event.pull_request.number }}}')
          fi
          echo "head=$(echo "$PR_DATA" | jq -r '.head')" >> "$GITHUB_OUTPUT"
          echo "base=$(echo "$PR_DATA" | jq -r '.base')" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_DATA" | jq -r '.number')" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-context.outputs.head }}

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex review
        id: codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BASE="${{ steps.pr-context.outputs.base }}"
          HEAD="${{ steps.pr-context.outputs.head }}"

          # Generate the diff explicitly (codex review needs a TTY; exec works in CI)
          git diff "$BASE...$HEAD" > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

          # Build the review prompt with the diff inlined
          {
            echo 'Review the following code diff. Mark findings [P1] (critical) or [P2] (advisory).'
            echo 'Focus on: security issues, logic errors, race conditions, data loss risks, API contract violations.'
            echo 'Ignore: style, naming nits, formatting, comments, whitespace.'
            echo ''
            echo 'DIFF_START'
            head -c 50000 /tmp/pr.diff
            echo 'DIFF_END'
          } > /tmp/prompt.txt

          # Run codex exec (non-interactive, suitable for CI)
          # Pass prompt as argument; cap at 100KB to avoid arg length limits
          codex exec "$(head -c 100000 /tmp/prompt.txt)" \
            -s read-only \
            -c 'model_reasoning_effort="high"' \
            --enable web_search_cached \
            2> /tmp/codex-stderr.txt | tee /tmp/codex-output.txt || true

          echo "--- STDERR ---"
          cat /tmp/codex-stderr.txt || true
          echo "--- OUTPUT SIZE ---"
          wc -c /tmp/codex-output.txt || true

          # Save output for next step
          {
            echo 'REVIEW_OUTPUT<<EOF'
            cat /tmp/codex-output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.codex.outputs.REVIEW_OUTPUT }}`;
            const truncated = output.length > 65000
              ? output.slice(0, 65000) + '\n\n_(Review truncated due to length)_'
              : output;

            const body = `## Codex Review\n\n${truncated || '_No review output generated._'}`;

            await github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
